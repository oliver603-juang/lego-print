<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrickSort 抽屜標籤列印 (L1437)</title>
<style>
  :root { --accent: #F5A623; --bg: #1a1a1a; --card: #242424; --text: #e8e4dc; --muted: #9c9a92; --green: #4CAF50; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  .control-panel {
    background: var(--card); padding: 16px 20px; border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .control-panel h1 { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .control-panel h1 span { font-size: 11px; color: var(--muted); font-weight: 400; display: block; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; }
  .ctrl-group label { font-size: 11px; color: var(--muted); }
  .ctrl-group input[type=number] { width: 52px; background: var(--bg); border: 1px solid #444; color: var(--text); padding: 4px 6px; border-radius: 4px; text-align: center; font-size: 12px; }
  .ctrl-group input[type=checkbox] { accent-color: var(--accent); }
  .ctrl-group select { background:var(--bg);border:1px solid #444;color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; transition: .15s; }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: #e6991a; }
  .btn-primary:disabled { background: #555; color: #999; cursor: not-allowed; }
  .btn-dark { background: #333; color: #fff; border: 1px solid #555; }
  .btn-dark:hover { background: #444; }
  .status { font-size: 11px; color: var(--green); }
  .status.err { color: #f44; }
  .spacer { flex: 1; }
  #info { font-size: 12px; color: var(--muted); text-align: center; padding: 40px 20px; }
  #info em { color: var(--accent); font-style: normal; }
  #range-group { transition: .2s; }

  /* === Print page layout === */
  .page {
    width: 210mm; height: 297mm; background: white; margin: 20px auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden;
  }
  .labels-grid {
    display: grid;
    grid-template-columns: repeat(5, 37mm);
    grid-template-rows: repeat(19, 14mm);
  }
  .label-cell {
    width: 37mm; height: 14mm;
    border: 1px dashed #ddd;
    display: flex; align-items: center;
    overflow: hidden; position: relative;
    page-break-inside: avoid;
  }

  /* === MAXIMIZED NUMBER === */
  .label-id {
    flex-shrink: 0;
    width: 14mm; height: 13.2mm;
    display: flex; justify-content: center; align-items: center;
    font-weight: 900; color: #000;
    line-height: 1; padding: 0 0.3mm;
    border-right: 0.5px solid #ccc;
    /* Font size set dynamically by JS based on digit count */
    font-size: 28pt;
    font-family: 'Arial Black', 'Impact', sans-serif;
    letter-spacing: -0.5pt;
  }
  /* 1-2 digit numbers (1~99): largest */
  .label-id.digits-1, .label-id.digits-2 { font-size: 32pt; }
  /* 3 digit numbers (100~450): slightly smaller */
  .label-id.digits-3 { font-size: 24pt; }
  /* L01~L27: with prefix */
  .label-id.digits-L { font-size: 20pt; letter-spacing: -1pt; }
  /* B01~B99: with prefix */
  .label-id.digits-B { font-size: 20pt; letter-spacing: -1pt; }
  /* B100+: smaller */
  .label-id.digits-B3 { font-size: 16pt; letter-spacing: -1pt; }

  .label-content {
    flex: 1; display: flex; justify-content: center; align-items: center;
    height: 100%; overflow: hidden; gap: 0.5mm;
  }
  .label-img {
    object-fit: contain; height: 12mm;
    max-width: 20mm;
  }
  .label-img.img-2 { max-width: 10mm; max-height: 11mm; }
  .label-img.img-3 { max-width: 7mm; max-height: 10mm; }

  /* Large drawer labels */
  .label-cell.large { background: #f8f8f8; }
  .label-cell.large .label-id { color: #333; border-right-color: var(--accent); }

  /* Bag labels */
  .label-cell.bag { background: #fafaf5; }

  /* Print styles */
  @media print {
    body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .control-panel, #info, .no-print { display: none !important; }
    .page { box-shadow: none !important; margin: 0 !important; border: none !important; page-break-after: always; }
    @page { size: A4; margin: 0; }
    .label-cell { border: none !important; }
    .label-id { border-right: 0.3px solid #ddd !important; }
  }
</style>
</head>
<body>

<div class="control-panel no-print">
  <h1>🧱 BrickSort 標籤列印<span>L1437 貼紙 · 5×19 = 95 格/頁</span></h1>

  <div class="ctrl-group">
    <label>上邊距</label>
    <input type="number" id="margin-top" value="15.5" step="0.5" onchange="updateMargins()">
    <label>mm</label>
  </div>
  <div class="ctrl-group">
    <label>左邊距</label>
    <input type="number" id="margin-left" value="12.5" step="0.5" onchange="updateMargins()">
    <label>mm</label>
  </div>
  <div class="ctrl-group">
    <input type="checkbox" id="show-borders" checked onchange="toggleBorders()">
    <label for="show-borders">預覽框線</label>
  </div>
  <div class="ctrl-group">
    <label>篩選</label>
    <select id="filter-zone" onchange="onFilterChange()">
      <option value="all">全部</option>
      <option value="small">小抽屜 (1~450)</option>
      <option value="large">大抽屜 (L1~L27)</option>
      <option value="bag">收納袋 (B)</option>
    </select>
  </div>

  <!-- Range selection (visible for small/bag) -->
  <div class="ctrl-group" id="range-group" style="display:none">
    <label>從</label>
    <input type="number" id="range-from" value="1" min="1" step="1" onchange="renderFromCache()">
    <label>到</label>
    <input type="number" id="range-to" value="999" min="1" step="1" onchange="renderFromCache()">
  </div>

  <div class="spacer"></div>
  <span id="status" class="status">讀取中...</span>
  <button id="load-btn" class="btn btn-primary" onclick="loadFromBrickSort()" disabled>讀取 BrickSort</button>
  <button class="btn btn-dark" onclick="window.print()">🖨 列印</button>
</div>

<div id="info">
  連線至 Firebase 後，點擊 <em>讀取 BrickSort</em> 載入已建檔零件。<br>
  每個抽屜號碼會顯示該格的零件縮圖，列印到 L1437 貼紙上貼到實體抽屜。
</div>

<div id="pages-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const FB_CONFIG = {
  apiKey: "AIzaSyDZltB8OQti4ZPkME-K95HXZL51oByXE10",
  projectId: "storesmart-7ae65"
};

let cachedItems = [];

async function init() {
  try {
    const app = initializeApp(FB_CONFIG);
    const db = getFirestore(app);
    document.getElementById('status').textContent = '✓ Firebase 已連線';
    document.getElementById('load-btn').disabled = false;

    window.loadFromBrickSort = async () => {
      const btn = document.getElementById('load-btn');
      btn.disabled = true; btn.textContent = '讀取中...';

      try {
        const snap = await getDocs(collection(db, 'lego_parts'));
        cachedItems = [];
        snap.forEach(doc => cachedItems.push({ id: doc.id, ...doc.data() }));

        btn.textContent = '✓ 已載入 ' + cachedItems.length + ' 件';
        btn.disabled = false;
        onFilterChange();
      } catch(e) {
        btn.textContent = '讀取失敗'; console.error(e);
        document.getElementById('status').className = 'status err';
        document.getElementById('status').textContent = '錯誤: ' + e.message;
      }
    };
  } catch(e) {
    document.getElementById('status').className = 'status err';
    document.getElementById('status').textContent = '連線失敗: ' + e.message;
  }
}

// Show/hide range inputs based on filter
window.onFilterChange = () => {
  const filter = document.getElementById('filter-zone').value;
  const rangeGroup = document.getElementById('range-group');
  const fromInput = document.getElementById('range-from');
  const toInput = document.getElementById('range-to');

  if (filter === 'bag') {
    rangeGroup.style.display = 'flex';
    // Auto-detect max bag number
    let maxBag = 1;
    cachedItems.forEach(i => {
      const m = (i.slot || '').match(/^B(\d+)$/);
      if (m) maxBag = Math.max(maxBag, parseInt(m[1]));
    });
    fromInput.value = 1;
    toInput.value = maxBag;
  } else if (filter === 'small') {
    rangeGroup.style.display = 'flex';
    fromInput.value = 1;
    toInput.value = 450;
  } else if (filter === 'large') {
    rangeGroup.style.display = 'flex';
    fromInput.value = 1;
    toInput.value = 27;
  } else {
    rangeGroup.style.display = 'none';
  }
  renderFromCache();
};

window.renderFromCache = () => {
  const filter = document.getElementById('filter-zone').value;
  const rangeFrom = parseInt(document.getElementById('range-from').value) || 1;
  const rangeTo = parseInt(document.getElementById('range-to').value) || 999;
  const drawerMap = {};

  cachedItems.forEach(item => {
    const slot = item.slot || '';
    if (!slot) return;

    // Filter by zone
    if (filter === 'small' && (slot.startsWith('L') || slot.startsWith('B'))) return;
    if (filter === 'large' && !slot.startsWith('L')) return;
    if (filter === 'bag' && !slot.startsWith('B')) return;

    // Filter by range
    if (filter === 'small' || filter === 'all') {
      const sm = slot.match(/^(\d+)[ab]?$/);
      if (sm && filter === 'small') {
        const n = parseInt(sm[1]);
        if (n < rangeFrom || n > rangeTo) return;
      }
    }
    if (filter === 'large') {
      const lm = slot.match(/^L(\d+)$/);
      if (lm) {
        const n = parseInt(lm[1]);
        if (n < rangeFrom || n > rangeTo) return;
      }
    }
    if (filter === 'bag') {
      const bm = slot.match(/^B(\d+)$/);
      if (bm) {
        const n = parseInt(bm[1]);
        if (n < rangeFrom || n > rangeTo) return;
      }
    }

    // Group by drawer (strip a/b suffix for small drawers)
    let drawerKey = slot;
    const m = slot.match(/^(\d+)[ab]$/);
    if (m) drawerKey = m[1];

    if (!drawerMap[drawerKey]) drawerMap[drawerKey] = { items: [], sides: {} };
    drawerMap[drawerKey].items.push(item);

    if (m) {
      const side = slot.endsWith('a') ? 'a' : 'b';
      if (!drawerMap[drawerKey].sides[side]) drawerMap[drawerKey].sides[side] = [];
      drawerMap[drawerKey].sides[side].push(item);
    }
  });

  renderLabels(drawerMap);
};

function naturalSort(a, b) {
  const isNumA = /^\d+$/.test(a), isNumB = /^\d+$/.test(b);
  const isLA = a.startsWith('L'), isLB = b.startsWith('L');
  if (isNumA && isNumB) return parseInt(a) - parseInt(b);
  if (isNumA && !isNumB) return -1;
  if (!isNumA && isNumB) return 1;
  if (isLA && isLB) return parseInt(a.slice(1)) - parseInt(b.slice(1));
  if (isLA && !isLB) return -1;
  if (!isLA && isLB) return 1;
  return a.localeCompare(b, undefined, { numeric: true });
}

function renderLabels(drawerMap) {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.getElementById('info').style.display = 'none';

  const sortedKeys = Object.keys(drawerMap).sort(naturalSort);
  const labelsPerPage = 95;
  const totalPages = Math.ceil(sortedKeys.length / labelsPerPage);

  for (let p = 0; p < totalPages; p++) {
    const page = document.createElement('div');
    page.className = 'page';
    const grid = document.createElement('div');
    grid.className = 'labels-grid';

    const pageKeys = sortedKeys.slice(p * labelsPerPage, (p + 1) * labelsPerPage);

    pageKeys.forEach(key => {
      const data = drawerMap[key];
      const label = createLabel(key, data);
      grid.appendChild(label);
    });

    page.appendChild(grid);
    container.appendChild(page);
  }

  updateMargins();

  // Update status
  document.getElementById('status').textContent = '✓ ' + sortedKeys.length + ' 個標籤 · ' + totalPages + ' 頁';
}

function getDigitClass(id) {
  if (id.startsWith('B')) {
    return id.length > 3 ? 'digits-B3' : 'digits-B';
  }
  if (id.startsWith('L')) return 'digits-L';
  const len = id.replace(/^0+/, '').length || 1;
  if (len <= 1) return 'digits-1';
  if (len <= 2) return 'digits-2';
  return 'digits-3';
}

function createLabel(drawerId, data) {
  const div = document.createElement('div');
  div.className = 'label-cell';
  if (drawerId.startsWith('L')) div.classList.add('large');
  if (drawerId.startsWith('B')) div.classList.add('bag');

  const isSmall = /^\d+$/.test(drawerId);
  let images = [];

  if (isSmall && data.sides) {
    const aImg = data.sides.a?.[0]?.thumbnailUrl || data.sides.a?.[0]?.imageData || '';
    const bImg = data.sides.b?.[0]?.thumbnailUrl || data.sides.b?.[0]?.imageData || '';
    if (aImg) images.push(aImg);
    if (bImg) images.push(bImg);
  }

  if (images.length === 0) {
    const unique = [...new Set(data.items.map(i => i.thumbnailUrl || i.imageData || '').filter(Boolean))];
    images = unique.slice(0, 3);
  }

  const imgClass = images.length >= 3 ? 'img-3' : images.length === 2 ? 'img-2' : '';
  const imgsHtml = images.map(url =>
    `<img src="${url}" class="label-img ${imgClass}" onerror="this.style.display='none'">`
  ).join('');

  // Display ID: strip leading zeros for small drawers
  let displayId = drawerId;
  if (isSmall) displayId = String(parseInt(drawerId));

  const digitClass = getDigitClass(displayId);

  div.innerHTML = `
    <div class="label-id ${digitClass}">${displayId}</div>
    <div class="label-content">${imgsHtml || '<span style="color:#ccc;font-size:7pt">空</span>'}</div>
  `;
  return div;
}

window.updateMargins = () => {
  const top = document.getElementById('margin-top').value;
  const left = document.getElementById('margin-left').value;
  document.querySelectorAll('.labels-grid').forEach(g => {
    g.style.paddingTop = top + 'mm';
    g.style.paddingLeft = left + 'mm';
  });
};

window.toggleBorders = () => {
  const show = document.getElementById('show-borders').checked;
  let style = document.getElementById('dynamic-style');
  if (!style) { style = document.createElement('style'); style.id = 'dynamic-style'; document.head.appendChild(style); }
  style.innerHTML = show ? '' : '.label-cell { border: none !important; } .label-id { border-right: none !important; }';
};

init();
</script>
</body>
</html>
